<form id="sponsorForm">
    <h1>Become a Sponsor</h1>
    <p>Join us in supporting students to achieve their educational dreams.</p>

    <form action="#" method="post">

        <label>Full Name / Company Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Type of Sponsor:</label><br>
        <select name="type">
            <option value="">Select</option>
            <option>Individual</option>
            <option>Company</option>
            <option>Organization</option>
        </select><br><br>

        <label>Amount Willing to Donate(ZAR):</label><br>
        <input type="number" name="amount"><br><br>

        <label>Preferred Field to Support:</label><br>
        <input type="text" name="field"><br><br>

        <label>Message / Motivation:</label><br>
        <textarea name="message" rows="5" cols="40"></textarea><br><br>

        <label>
            <input type="checkbox" name="terms" required>
            I agree to support students through this initiative
        </label><br><br>

        <input type="submit" value="Become a Sponsor">

    </form>
<script src="script.js"></script>
