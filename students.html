<form id="studentForm">
    <h1>Student Application Form</h1>
    <p>Please fill in your details to apply for educational support.</p>

    <form action="#" method="post">

        <label>Full Name:</label><br>
        <input type="text" name="fullname" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required><br><br>

        <label>Gender:</label><br>
        <select name="gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br><br>

        <label>Field of Study:</label><br>
        <input type="text" name="field" required><br><br>

        <label>Institution Name:</label><br>
        <input type="text" name="institution" required><br><br>

        <label>Year of Study:</label><br>
        <input type="number" name="year" min="1" max="5000"><br><br>

        <label>Why do you need sponsorship?</label><br>
        <textarea name="motivation" rows="5" cols="40"></textarea><br><br>

        <label>Upload Academic Results:</label><br>
        <input type="file" name="results"><br><br>

        <input type="submit" value="Submit Application">

    </form>
<script src="script.js"></script>
</body>
</html>
